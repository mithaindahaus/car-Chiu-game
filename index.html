<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen"/>
  <meta name="apple-mobile-web-app-title" content="Cars Fun"/>
  <title>Cars Fun 🚗</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
    html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
    body{transition:background 0.5s ease;display:flex;align-items:center;justify-content:center;}

    /* Road stripes at bottom */
    #road{position:fixed;bottom:0;left:0;right:0;height:14vw;background:#2b2b2b;overflow:hidden;}
    #road::before{content:'';position:absolute;top:50%;left:-100%;width:300%;height:3px;background:repeating-linear-gradient(90deg,#FFD93D 0,#FFD93D 6vw,transparent 6vw,transparent 12vw);animation:roadMove 0.6s linear infinite;}
    @keyframes roadMove{to{transform:translateX(12vw);}}

    /* Floating bubbles */
    .bubble{position:fixed;border-radius:50%;pointer-events:none;opacity:0.15;animation:floatUp linear infinite;}
    @keyframes floatUp{0%{transform:translateY(110vh);opacity:0.15}100%{transform:translateY(-20vh);opacity:0}}

    /* Speed lines */
    .speedline{position:fixed;pointer-events:none;height:2px;border-radius:2px;opacity:0;animation:speedIn 0.5s ease-out forwards;}
    @keyframes speedIn{0%{opacity:0;transform:scaleX(0)}40%{opacity:0.5}100%{opacity:0;transform:scaleX(1)}}

    #stage{position:fixed;inset:0;bottom:14vw;display:flex;flex-direction:column;align-items:center;justify-content:center;}

    /* Logo badge */
    #brand-logo{
      font-size:5vw;font-weight:900;color:white;
      background:rgba(255,255,255,0.18);
      border:2px solid rgba(255,255,255,0.4);
      border-radius:50px;
      padding:1.5vw 5vw;
      letter-spacing:0.15em;
      margin-bottom:2vw;
      backdrop-filter:blur(8px);
    }
    .logo-in{animation:logoIn 0.4s cubic-bezier(.34,1.56,.64,1);}
    @keyframes logoIn{0%{opacity:0;transform:translateY(-10px) scale(0.8)}100%{opacity:1;transform:translateY(0) scale(1)}}

    #car-wrap{
      width:82vw;height:48vw;max-width:400px;max-height:240px;
      display:flex;align-items:center;justify-content:center;
      filter:drop-shadow(0 12px 28px rgba(0,0,0,0.35));
      animation:carIdle 2.2s ease-in-out infinite;
    }
    @keyframes carIdle{
      0%,100%{transform:translateY(0) rotate(-0.5deg)}
      50%{transform:translateY(-2vw) rotate(0.5deg)}
    }
    #car-wrap.bounce{animation:carBounce 0.5s cubic-bezier(.34,1.56,.64,1) !important;}
    @keyframes carBounce{
      0%{transform:scale(1) rotate(-0.5deg)}
      30%{transform:scale(1.15) rotate(3deg)}
      60%{transform:scale(0.93) rotate(-2deg)}
      100%{transform:scale(1) rotate(-0.5deg)}
    }
    #car-svg{width:100%;height:100%;}

    #car-name{font-size:7.5vw;font-weight:900;color:white;text-shadow:0 3px 0 rgba(0,0,0,0.2),0 6px 18px rgba(0,0,0,0.18);letter-spacing:0.04em;margin-top:2vw;text-align:center;padding:0 4vw;line-height:1.2;}
    .name-in{animation:nameIn 0.45s cubic-bezier(.34,1.56,.64,1);}
    @keyframes nameIn{0%{transform:scale(0.4) translateY(15px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}

    #car-fact{font-size:4vw;color:rgba(255,255,255,0.88);margin-top:1.5vw;text-align:center;padding:0 6vw;font-weight:700;line-height:1.4;}
    .fact-in{animation:factIn 0.5s ease-out 0.15s both;}
    @keyframes factIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

    #hint{position:fixed;bottom:18vw;width:100%;text-align:center;font-size:5vw;color:rgba(255,255,255,0.82);font-weight:800;letter-spacing:0.05em;animation:pulse 1.8s ease-in-out infinite;transition:opacity 0.5s;}
    @keyframes pulse{0%,100%{opacity:0.82;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}

    .burst{position:fixed;pointer-events:none;font-size:6.5vw;animation:burstOut 0.7s ease-out forwards;z-index:99;}
    @keyframes burstOut{0%{transform:translate(-50%,-50%) scale(0.2);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.5);opacity:0}}

    #flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 0.07s;z-index:50;}
    #flash.on{opacity:0.25;transition:opacity 0s;}

    #vroom{position:fixed;top:8vw;left:50%;transform:translateX(-50%);font-size:11vw;font-weight:900;color:white;text-shadow:0 4px 20px rgba(0,0,0,0.35);pointer-events:none;opacity:0;z-index:60;white-space:nowrap;letter-spacing:0.06em;}
    .vroom-in{animation:vroomPop 0.85s cubic-bezier(.34,1.56,.64,1) forwards;}
    @keyframes vroomPop{0%{opacity:0;transform:translateX(-50%) scale(0.3)}30%{opacity:1;transform:translateX(-50%) scale(1.18)}70%{opacity:1;transform:translateX(-50%) scale(0.96)}100%{opacity:0;transform:translateX(-50%) scale(1)}}

    #counter{position:fixed;top:5vw;right:5vw;background:rgba(255,255,255,0.22);border-radius:50px;padding:2vw 4vw;font-size:4vw;font-weight:900;color:white;backdrop-filter:blur(6px);}
  </style>
</head>

const BURST_EMOJIS=["⭐","🌟","✨","💫","🎉","🏎️","🚗","💨","🔥","💎"];
let currentIdx=0,audioCtx=null,lastTap=0;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playRevSound(freq){
  try{
    const ctx=getAudio();
    // Engine rev sound
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    const osc2=ctx.createOscillator(),gain2=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc2.connect(gain2);gain2.connect(ctx.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(freq*0.5,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*2,ctx.currentTime+0.3);
    osc.frequency.exponentialRampToValueAtTime(freq*0.8,ctx.currentTime+0.6);
    gain.gain.setValueAtTime(0,ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.7);
    osc2.type='square';
    osc2.frequency.setValueAtTime(freq*0.25,ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(freq,ctx.currentTime+0.3);
    gain2.gain.setValueAtTime(0.12,ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);
    osc2.start(ctx.currentTime);osc2.stop(ctx.currentTime+0.6);
  }catch(e){}
}

function makeBubbles(){
  const colors=["#FFD93D","#FF6B35","#4FC3F7","#A5D6A7","#CE93D8","#80DEEA"];
  for(let i=0;i<10;i++){
    const b=document.createElement('div');b.className='bubble';
    const s=4+Math.random()*12;
    b.style.cssText=`width:${s}vw;height:${s}vw;left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(b);
  }
}

function spawnBurst(x,y){
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='burst';
    el.textContent=BURST_EMOJIS[Math.floor(Math.random()*BURST_EMOJIS.length)];
    const angle=(Math.PI*2/8)*i,dist=14+Math.random()*18;
    el.style.cssText=`left:${x}px;top:${y}px;--dx:${Math.cos(angle)*dist}vw;--dy:${Math.sin(angle)*dist}vw;animation-delay:${Math.random()*0.08}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),800);
  }
}

function spawnSpeedlines(color){
  for(let i=0;i<5;i++){
    const el=document.createElement('div');el.className='speedline';
    const y=30+Math.random()*50;
    const w=15+Math.random()*20;
    el.style.cssText=`top:${y}vw;left:${2+Math.random()*10}vw;width:${w}vw;background:${color};animation-delay:${i*0.06}s;transform-origin:left center;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),600);
  }
}

function showCar(idx){
  const c=CARS[idx];
  document.getElementById('car-svg').innerHTML=c.svg;
  document.body.style.background=`linear-gradient(135deg,${c.bg[0]},${c.bg[1]})`;

  const brandEl=document.getElementById('brand-logo');
  const nameEl=document.getElementById('car-name');
  const factEl=document.getElementById('car-fact');
  const vroomEl=document.getElementById('vroom');

  brandEl.textContent=c.brand;
  nameEl.textContent=c.name;
  factEl.textContent=c.fact;

  brandEl.className='';brandEl.offsetHeight;brandEl.className='logo-in';
  nameEl.className='';nameEl.offsetHeight;nameEl.className='name-in';
  factEl.className='';factEl.offsetHeight;factEl.className='fact-in';

  vroomEl.textContent=c.vroom;
  vroomEl.className='';vroomEl.offsetHeight;vroomEl.className='vroom-in';

  const wrap=document.getElementById('car-wrap');
  wrap.classList.remove('bounce');wrap.offsetHeight;wrap.classList.add('bounce');
  setTimeout(()=>wrap.classList.remove('bounce'),700);

  document.getElementById('counter').textContent=`${idx+1} / ${CARS.length}`;
  playRevSound(c.sound);
  spawnSpeedlines('rgba(255,255,255,0.35)');
}

function flash(color){
  const f=document.getElementById('flash');f.style.background=color;
  f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90);
}

function onTap(e){
  e.preventDefault();
  const now=Date.now();if(now-lastTap<300)return;lastTap=now;
  const touch=e.touches?e.touches[0]:e;
  const x=touch?touch.clientX:window.innerWidth/2,y=touch?touch.clientY:window.innerHeight/2;
  currentIdx=(currentIdx+1)%CARS.length;
  showCar(currentIdx);spawnBurst(x,y);flash(CARS[currentIdx].bg[1]);
  document.getElementById('hint').style.opacity='0';
}

document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('touchstart',onTap,{passive:false});
document.addEventListener('mousedown',onTap);
makeBubbles();showCar(0);
</script>
